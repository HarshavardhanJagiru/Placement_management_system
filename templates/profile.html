{% extends 'base.html' %}

{% block title %}My Profile - Placement Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-4">Professional <span class="text-primary">Profile</span></h2>
                <form action="{{ url_for('profile') }}" method="POST" enctype="multipart/form-data">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="full_name" class="form-control" value="{{ student.full_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <input type="text" name="department" class="form-control" value="{{ student.department }}" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">CGPA</label>
                            <input type="number" step="0.01" name="cgpa" class="form-control" value="{{ student.cgpa }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Upload Resume (PDF only)</label>
                            <input type="file" name="resume_file" class="form-control" accept=".pdf">
                            {% if student.resume_filename %}
                            <div class="mt-2 small text-muted">
                                Current: <a href="{{ url_for('view_resume', filename=student.resume_filename) }}" target="_blank">View Resume</a>
                            </div>
                            {% endif %}
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Skills (comma separated)</label>
                        <textarea name="skills" class="form-control" rows="3" placeholder="Python, React, SQL, AWS, Machine Learning...">{{ student.skills if student.skills else '' }}</textarea>
                        <small class="text-muted">Enter your expert skills separated by commas.</small>
                    </div>
                    <button type="submit" class="btn btn-primary px-4 py-2">Update Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
