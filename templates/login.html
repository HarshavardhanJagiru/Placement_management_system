{% extends 'base.html' %}

{% block title %}Login - Placement Management System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg glass-card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold text-primary">Sign In</h3>
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" id="username" required placeholder="Enter username">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="password" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted small">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none">Register as Student</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
