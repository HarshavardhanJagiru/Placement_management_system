{% extends 'base.html' %}

{% block title %}Reset Password - Placement Management System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg glass-card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold text-primary">Reset Password</h3>
                <p class="text-muted text-center mb-4">We've sent a 6-digit code to your email. Enter it below along with your new password.</p>
                <form action="{{ url_for('reset_password') }}" method="POST">
                    <div class="mb-3">
                        <label for="otp_code" class="form-label">6-Digit Code</label>
                        <input type="text" name="otp_code" class="form-control text-center fw-bold fs-4" id="otp_code" required maxlength="6" pattern="\d{6}" placeholder="······">
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">New Password</label>
                        <input type="password" name="new_password" class="form-control" id="new_password" required placeholder="Enter new password">
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control" id="confirm_password" required placeholder="Confirm new password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Reset Password</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted small">Didn't receive the code? <a href="{{ url_for('forgot_password') }}" class="text-decoration-none">Resend Code</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
