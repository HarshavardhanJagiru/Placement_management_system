{% extends 'base.html' %}

{% block title %}Forgot Password - Placement Management System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg glass-card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold text-primary">Forgot Password</h3>
                <p class="text-muted text-center mb-4">Enter your registered email address and we'll send you a 6-digit code to reset your password.</p>
                <form action="{{ url_for('forgot_password') }}" method="POST">
                    <div class="mb-4">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" id="email" required placeholder="name@example.com">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Send Reset Code</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted small"><a href="{{ url_for('login') }}" class="text-decoration-none"><i class="fas fa-arrow-left me-1"></i> Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
